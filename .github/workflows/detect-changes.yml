#
# Centralized path-change detection for use by other workflows.
# Emits boolean outputs for the two main code domains (php, js)
# so callers don't need to duplicate dorny/paths-filter config.

name: Detect changes

on:
  workflow_call:
    outputs:
      php:
        description: 'true if PHP-relevant files changed'
        value: ${{ jobs.detect.outputs.php }}
      js:
        description: 'true if JS/frontend-relevant files changed'
        value: ${{ jobs.detect.outputs.js }}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest-low
    permissions:
      contents: read
      pull-requests: read

    outputs:
      php: ${{ steps.changes.outputs.php }}
      js: ${{ steps.changes.outputs.js }}

    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        continue-on-error: true
        with:
          filters: |
            php:
              - '.github/workflows/**'
              - '3rdparty/**'
              - '**/appinfo/**'
              - '**/lib/**'
              - '**/templates/**'
              - '**/tests/**'
              - 'resources/**'
              - 'vendor/**'
              - 'vendor-bin/**'
              - '.php-cs-fixer.dist.php'
              - 'composer.json'
              - 'composer.lock'
              - '**.php'
            js:
              - '.github/workflows/**'
              - '**/src/**'
              - '**/__tests__/**'
              - '**/__mocks__/**'
              - '**/appinfo/info.xml'
              - 'core/css/*'
              - 'core/img/**'
              - 'package.json'
              - '**/package-lock.json'
              - 'tsconfig.json'
              - '.eslintrc.*'
              - '.eslintignore'
              - '.stylelintrc.*'
              - 'version.php'
              - '**.js'
              - '**.ts'
              - '**.vue'
              - '**.css'
              - '**.scss'
